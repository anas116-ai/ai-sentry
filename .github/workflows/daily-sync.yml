name: Daily AI Tools Sync

on:
  schedule:
    # ప్రతిరోజూ ఉదయం 00:00 UTC కి రన్ అవుతుంది (నువ్వు టైమ్ మార్చుకోవచ్చు)
    - cron: '0 0 * * *'
  workflow_dispatch: # మాన్యువల్ గా రన్ చేయడానికి

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/experimental/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios @supabase/supabase-js

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-tools.js